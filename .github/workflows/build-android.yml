name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies and build Mobile App web assets
        working-directory: ./mobile-app
        run: |
          npm install
          npm run build

      - name: Sync Capacitor to Android
        working-directory: ./mobile-app
        run: npx cap sync android

      - name: Build APK (Assemble Debug)
        working-directory: ./mobile-app/android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electro-Book-App
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
